
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal 1DS</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/auth.js" defer></script>
  <script src="js/posts.js" defer></script>
  <script src="js/comments.js" defer></script>
  <script src="js/online.js" defer></script>
  <script src="js/app.js" defer></script>
</head>
<body>

  <header class="navbar">
    <div class="logo">Portal 1DS</div>
    <nav class="nav-links">
      <a href="#" id="navHome" class="active">Início</a>
      <a href="#" id="navProfile" class="auth-only hidden">Meu Perfil</a>
      <a href="#" id="navCreatePost" class="auth-only hidden">Criar Post</a>
      <a href="#" id="navLogin" class="guest-only">Entrar</a>
      <a href="#" id="navRegister" class="guest-only">Cadastrar</a>
      <a href="#" id="navLogout" class="auth-only hidden">Sair</a>
    </nav>
  </header>

  <main class="main-container">
    
    <section class="content-area">
      
      <div id="feedView" class="view-section">
        <h2>Feed de Tecnologia</h2>
        <div id="postsContainer"></div>
      </div>

      <div id="createPostView" class="view-section hidden">
        <div class="card">
          <h2>Nova Publicação</h2>
          <form id="postForm">
            <input type="text" id="postTitle" placeholder="Título" required>
            <textarea id="postContent" placeholder="Conteúdo do post..." required></textarea>
            <input type="text" id="postCategory" placeholder="Categoria (ex: IA, Web)" required>
            <input type="text" id="postImage" placeholder="URL da Imagem (Opcional)">
            <button type="submit" class="btn">Publicar</button>
          </form>
        </div>
      </div>

      <div id="loginView" class="view-section hidden">
        <div class="card">
          <h2>Entrar</h2>
          <form id="loginForm">
            <input type="text" id="loginUser" placeholder="Usuário" required>
            <input type="password" id="loginPass" placeholder="Senha" required>
            <button type="submit" class="btn">Entrar</button>
          </form>
        </div>
      </div>

      <div id="registerView" class="view-section hidden">
        <div class="card">
          <h2>Cadastrar Conta</h2>
          <form id="registerForm">
            <input type="text" id="regName" placeholder="Nome Completo" required>
            <input type="text" id="regUser" placeholder="Nome de Usuário" required>
            <input type="email" id="regEmail" placeholder="E-mail" required>
            <input type="password" id="regPass" placeholder="Senha" required>
            <button type="submit" class="btn">Criar Conta</button>
          </form>
        </div>
      </div>

      <div id="profileView" class="view-section hidden">
        <div class="card profile-card">
          <h2 id="profName">Nome</h2>
          <p id="profUsername">@usuario</p>
          <p>🧑‍💻 Membro do Portal 1DS</p>
        </div>
      </div>

    </section>

    <aside class="sidebar">
      <div class="card">
        <h3>Usuários Online</h3>
        <ul id="onlineList"></ul>
      </div>
    </aside>

  </main>

</body>
</html>
