<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal 1DS - Rede Social de Tecnologia</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="/socket.io/socket.io.js" defer></script>
  <script src="js/auth.js" defer></script>
  <script src="js/posts.js" defer></script>
  <script src="js/comments.js" defer></script>
  <script src="js/online.js" defer></script>
  <script src="js/app.js" defer></script>
</head>
<body>

  <header class="navbar">
    <div class="logo">Portal 1DS</div>
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Pesquisar posts ou categorias...">
    </div>
    <nav class="nav-links">
      <a href="#" class="active" id="navHome">Início</a>
      <a href="#" id="navProfile" class="hidden auth-only">Meu Perfil</a>
      <a href="#" id="navCreatePost" class="hidden auth-only">Criar Post</a>
      <a href="#" id="navLogin" class="guest-only">Entrar</a>
      <a href="#" id="navRegister" class="guest-only">Cadastrar</a>
      <a href="#" id="navLogout" class="hidden auth-only">Sair</a>
    </nav>
  </header>

  <main class="main-container">
    
    <section class="content-area">
      
      <div id="feedView" class="view-section">
        <h2>Feed de Publicações</h2>
        <div id="postsContainer"></div>
      </div>

      <div id="createPostView" class="view-section hidden">
        <div class="card">
          <h2>Nova Publicação</h2>
          <form id="postForm">
            <input type="text" id="postTitle" placeholder="Título do Post" required>
            <textarea id="postContent" placeholder="O que você está pensando sobre tecnologia hoje?" required></textarea>
            <input type="text" id="postCategory" placeholder="Categoria (ex: Web, IA, Hardware)" required>
            <input type="text" id="postImage" placeholder="URL da Imagem (Opcional)">
            <button type="submit" class="btn">Publicar</button>
          </form>
        </div>
      </div>

      <div id="loginView" class="view-section hidden">
        <div class="card auth-card">
          <h2>Entrar no Portal 1DS</h2>
          <form id="loginForm">
            <input type="text" id="loginUser" placeholder="Nome de usuário" required>
            <input type="password" id="loginPass" placeholder="Senha" required>
            <label><input type="checkbox"> Lembrar-me</label>
            <button type="submit" class="btn">Entrar</button>
          </form>
        </div>
      </div>

      <div id="registerView" class="view-section hidden">
        <div class="card auth-card">
          <h2>Criar Nova Conta</h2>
          <form id="registerForm">
            <input type="text" id="regName" placeholder="Nome Completo" required>
            <input type="text" id="regUser" placeholder="Nome de Usuário" required>
            <input type="email" id="regEmail" placeholder="E-mail" required>
            <input type="password" id="regPass" placeholder="Senha Forte" required>
            <input type="text" id="regAvatar" placeholder="URL da Foto de Perfil (Opcional)">
            <button type="submit" class="btn">Criar Conta</button>
          </form>
        </div>
      </div>

      <div id="profileView" class="view-section hidden">
        <div class="card profile-card">
          <div class="banner"></div>
          <img id="profAvatar" src="" alt="Avatar" class="profile-avatar">
          <h2 id="profName">Nome</h2>
          <p id="profUsername">@usuario</p>
          <p id="profBio">Biografia...</p>
          <div class="stats">
            <span><strong id="countFollowers">0</strong> Seguidores</span>
            <span><strong id="countFollowing">0</strong> Seguindo</span>
          </div>
        </div>
      </div>

    </section>

    <aside class="sidebar">
      <div class="card">
        <h3>Usuários Online</h3>
        <ul id="onlineList" class="online-list">
          </ul>
      </div>
    </aside>

  </main>

</body>
</html>
